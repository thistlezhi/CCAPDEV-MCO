<!DOCTYPE html>
<html>
<head>
  <title>Technician Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <div class="technician">

    <div>
      <div class="headertext">Technician Controls</div>
      <button id="walkinBtn">Reserve for Walk-in</button>
    </div>

    <div>
      <div class="headertext">All Reservations</div>

      <div class="tablescroll">

        <table id="techTable">

          <thead>
            <tr>
              <th>User</th>
              <th>Lab</th>
              <th>Seat</th>
              <th>Date</th>
              <th>Time</th>
              <th>Date Requested</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody></tbody>

        </table>

      </div>

    </div>


    <!-- EDIT MODAL -->
    <div id="editModal" class="modal">

      <div class="modal-content">

        <div class="modal-header">
          <h2>Edit Reservation</h2>
          <button class="close-btn" id="closeEdit">&times;</button>
        </div>

        <form id="editForm">

          <label>User</label>
          <input id="editUser" disabled>

          <label>Lab</label>
          <select id="editLab"></select>

          <label>Date</label>
          <input type="date" id="editDate" required>

          <label>Time</label>
          <select id="editTime" required>

          <label>Seat</label>
          <input type="number" id="editSeat" min="1" required>

          <div class="modal-actions">
            <button type="button" id="cancelEdit">Cancel</button>
            <button type="submit">Save Changes</button>
          </div>

        </form>

      </div>

    </div>



    <!-- WALK-IN MODAL -->
    <div id="walkinModal" class="modal">

      <div class="modal-content">

        <div class="modal-header">
          <h2>Reserve for Walk-in</h2>
          <button class="close-btn" id="closeWalkin">&times;</button>
        </div>

        <form id="walkinForm">

          <label>Student</label>
          <select id="walkinStudent"></select>

          <label>Lab</label>
          <select id="walkinLab"></select>

          <label>Date</label>
          <input type="date" id="walkinDate">

          <label>Time</label>
          <select id="walkinTime" required></select>

          <label>Seat</label>
          <input type="number" id="walkinSeat" min="1">

          <div class="modal-actions">
            <button type="button" id="cancelWalkin">Cancel</button>
            <button type="submit">Create Reservation</button>
          </div>

        </form>

      </div>

    </div>


    <div class="backfooter">
      <a href="home.html">Back to Home Page</a>
    </div>

  </div>

</div>

<script src="js/technician.js"></script>

</body>
</html>
