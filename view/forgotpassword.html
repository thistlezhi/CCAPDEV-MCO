<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="forget">
            <div class="headertext">Forgot Password</div>

                <section class="email">
                    <label for="forgetemail">Email:</label>
                    <input type="email" id="forgetemail" name="forgetemail" placeholder="Enter your email"required>
                </section>

                <section class="submit">
                    <button type="submit" id="submit">Check Your Email</button>
                </section>

                <div class="redirect">
                    <a href="login.html">Back to Login</a>
                </div>
        </div>
    </div>

    <script>
    const submitButton = document.getElementById("submit");
    const forgetDiv = document.querySelector(".forget");

    submitButton.addEventListener("click", async function() {
        const emailInput = document.getElementById('forgetemail').value.trim();

        if (!emailInput) {
            alert("Please enter your email.");
            return;
        }

        // 1. Verify if the email exists via the backend
    
        const response = await fetch("/check-email", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: emailInput })
        });

        const data = await response.json();

        if (!data.exists) {
            alert("Email not found.");
            return;
        }

        // 2. Hide email input and show password reset fields
        submitButton.style.display = "none";
        document.getElementById('forgetemail').disabled = true;

        const resetPassHTML = `
            <section class="password">
                <label>Enter New Password:</label>
                <input type="password" id="newPassword">
            </section>
            <section class="password">
                <label>Confirm New Password:</label>
                <input type="password" id="confirmPassword">
            </section>
            <section class="submit">
                <button type="button" id="resetButton">Reset Password</button>
            </section>
        `;

        document.querySelector(".redirect").insertAdjacentHTML("beforebegin", resetPassHTML);

        // 3. Handle the actual password update
        document.getElementById("resetButton").addEventListener("click", async function() {
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (!newPassword || newPassword !== confirmPassword) {
                alert("Passwords must match and cannot be empty.");
                return;
            }

            const updateRes = await fetch("/reset-password", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    email: emailInput, 
                    password: newPassword 
                })
            });

            const updateData = await updateRes.json();

            if (updateData.success) {
                alert("Password successfully updated.");
                window.location.href = "login.html";
            } else {
                alert("Error updating password.");
            }
        });
    });
</script>
</body>
</html>
